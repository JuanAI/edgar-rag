name: PR

# Runs on every pull request and on pushes to main. GitHub Actions is free for
# public repositories, so this costs nothing.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Set up environment
        run: make setup

      - name: Pre-commit checks
        uses: pre-commit/action@v3.0.1

      - name: Type check
        run: make typecheck

      - name: Run tests
        run: make test

      # Cache the MiniLM weights so the model-backed tests download it only once
      # across CI runs (~90MB), then run the real embedder end to end.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-all-MiniLM-L6-v2

      - name: Run model-backed tests
        run: make test-local
